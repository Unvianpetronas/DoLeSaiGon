spring.application.name=Doanlesg
server.port=8080

spring.datasource.url=jdbc:sqlserver://localhost;instanceName=DOLESAIGON;databaseName=DOLESAIGON;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.liquibase.enabled=true

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

spring.jpa.generate-ddl=false
spring.liquibase.change-log=classpath:/db/changelog/changelog-master.yaml

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.data.web.pageable.max-page-size=200

N8N_CHECK_URL=https://unviansevtw.app.n8n.cloud/webhook/casso-payment
CASSO_POLLING_DELAY_MS=5000